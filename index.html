<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <canvas id="cyber-bg" aria-hidden="true"></canvas>

    <div class="calculadora"><input type="text" id="pantalla" readonly value="0">
<!-- Fila 1 -->
    <button onclick="borrarTodo()" class="boton-largo">C</button>
    <button onclick="borrarUno()" class="boton-borrar" aria-label="Borrar último caracter">
        <svg viewBox="0 0 65 49" role="img" aria-hidden="true">
            <rect x="1" y="1" width="63" height="47" rx="10" fill="#666" />
            <path d="M20 15L45 34" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
            <path d="M45 15L20 34" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
        </svg>
    </button>
    <button onclick="elegirOperador('/')" class="operador">/</button>

    <!-- Fila 2 -->
    <button onclick="agregarNumero('7')">7</button>
    <button onclick="agregarNumero('8')">8</button>
    <button onclick="agregarNumero('9')">9</button>
    <button onclick="elegirOperador('*')" class="operador">x</button>

    <!-- Fila 3 -->
    <button onclick="agregarNumero('4')">4</button>
    <button onclick="agregarNumero('5')">5</button>
    <button onclick="agregarNumero('6')">6</button>
    <button onclick="elegirOperador('-')" class="operador">-</button>

    <!-- Fila 4 -->
    <button onclick="agregarNumero('1')">1</button>
    <button onclick="agregarNumero('2')">2</button>
    <button onclick="agregarNumero('3')">3</button>
    <button onclick="elegirOperador('+')" class="operador">+</button>

    <!-- Fila 5 -->
    <button onclick="agregarNumero('0')">0</button>
    <button onclick="agregarNumero('.')">.</button>
    <button onclick="calcular()" class="operador">=</button>
    </div>
</body>
<script src="script.js">
</script>
</html>
